<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A120B" stop-opacity="0.92"/>
      <stop offset="0.5" stop-color="#111111" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#2B1608" stop-opacity="0.92"/>
    </linearGradient>
    <radialGradient id="glowbg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(600 130) rotate(90) scale(180 520)">
      <stop stop-color="#FF7A00" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FF7A00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    .title {
      font: 700 18px 'JetBrains Mono', monospace;
      fill: #FF8A1F;
      white-space: pre;
      animation: glow 2.2s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from {
        filter:
          drop-shadow(0 0 2px rgba(255,138,31,0.55))
          drop-shadow(0 0 6px rgba(255,138,31,0.25));
        opacity: 0.88;
      }
      to {
        filter:
          drop-shadow(0 0 6px rgba(255,138,31,0.95))
          drop-shadow(0 0 18px rgba(255,102,0,0.65))
          drop-shadow(0 0 32px rgba(255,102,0,0.35));
        opacity: 1;
      }
    }
    .noise {
      opacity: 0.045;
      mix-blend-mode: soft-light;
    }
  </style>
  <!-- background -->
  <rect width="1200" height="260" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="260" rx="18" fill="url(#glowbg)"/>
  <!-- soft scanlines -->
  <g opacity="0.08">
    <rect y="20" width="1200" height="1" fill="#ffffff"/>
    <rect y="50" width="1200" height="1" fill="#ffffff"/>
